<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NutriGPT - Meal Ingredients</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #2d6a4f; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #2d6a4f; color: white; padding: 12px 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        .btn { padding: 6px 12px; border-radius: 5px; text-decoration: none; font-size: 13px; }
        .btn-edit { background: #f0a500; color: white; }
        .btn-delete { background: #e63946; color: white; }
        .btn-add { display: inline-block; margin: 20px 0; background: #2d6a4f; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; }
        .empty { text-align: center; color: #aaa; padding: 40px; }
        .back { color: #2d6a4f; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <a href="/meal/" class="back">← Back to Meals</a>
    <h1>🥗 Meal Ingredients</h1>
    <a href="/meal/ingredients/create/" class="btn-add">+ Add Ingredient</a>

    {% if ingredients %}
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Meal</th>
                <th>Ingredient</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for item in ingredients %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.meal.name }}</td>
                <td>{{ item.ingredient.name }}</td>
                <td>{{ item.quantity }}</td>
                <td>
                    <a href="/meal/ingredients/update/{{ item.pk }}/" class="btn btn-edit">Edit</a>
                    <a href="/meal/ingredients/delete/{{ item.pk }}/" class="btn btn-delete">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <div class="empty">No ingredients added yet.</div>
    {% endif %}
</body>
</html>
